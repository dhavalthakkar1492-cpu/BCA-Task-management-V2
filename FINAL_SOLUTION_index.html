<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CA Firm Management Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;
        const { BarChart3, FileText, Users, AlertCircle, TrendingUp, Clock, CheckCircle, Home, Plus, Download } = {
            BarChart3: () => <span>📊</span>,
            FileText: () => <span>📄</span>,
            Users: () => <span>👥</span>,
            AlertCircle: () => <span>⚠️</span>,
            TrendingUp: () => <span>📈</span>,
            Clock: () => <span>⏱️</span>,
            CheckCircle: () => <span>✅</span>,
            Home: () => <span>🏠</span>,
            Plus: () => <span>➕</span>,
            Download: () => <span>⬇️</span>,
        };

        const CAFirmPortal = () => {
            const [activeModule, setActiveModule] = useState('dashboard');
            const [tasks] = useState([
                { id: 'TSK-001', title: 'Complete GST Return', assignee: 'John Doe', client: 'ABC Corp', dueDate: '15-03-2026', priority: 'High', status: 'In Progress', complete: 75 },
                { id: 'TSK-002', title: 'ITR Review', assignee: 'Jane Smith', client: 'XYZ Ltd', dueDate: '20-03-2026', priority: 'Medium', status: 'Pending', complete: 0 },
                { id: 'TSK-003', title: 'Audit Documentation', assignee: 'Bob Johnson', client: 'PQR Inc', dueDate: '31-03-2026', priority: 'High', status: 'Not Started', complete: 0 },
            ]);

            const [invoices] = useState([
                { id: 'INV-001', client: 'ABC Corp', date: '01-02-2026', amount: 50000, dueDate: '15-02-2026', received: 50000, status: 'Paid' },
                { id: 'INV-002', client: 'XYZ Ltd', date: '10-02-2026', amount: 75000, dueDate: '24-02-2026', received: 25000, status: 'Partial' },
                { id: 'INV-003', client: 'PQR Inc', date: '15-02-2026', amount: 100000, dueDate: '01-03-2026', received: 0, status: 'Unpaid' },
            ]);

            const [staff] = useState([
                { id: 1, name: 'John Doe', designation: 'Senior CA', email: 'john@firm.com', tasks: 5, status: 'Active', utilization: 85 },
                { id: 2, name: 'Jane Smith', designation: 'CA Associate', email: 'jane@firm.com', tasks: 3, status: 'Active', utilization: 60 },
                { id: 3, name: 'Bob Johnson', designation: 'Junior CA', email: 'bob@firm.com', tasks: 2, status: 'On Leave', utilization: 0 },
            ]);

            const getStatusColor = (status) => {
                const colors = {
                    'In Progress': 'bg-blue-100 text-blue-800',
                    'Pending': 'bg-yellow-100 text-yellow-800',
                    'Not Started': 'bg-gray-100 text-gray-800',
                    'Paid': 'bg-green-100 text-green-800',
                    'Unpaid': 'bg-red-100 text-red-800',
                    'Partial': 'bg-orange-100 text-orange-800',
                    'Active': 'bg-green-100 text-green-800',
                    'On Leave': 'bg-orange-100 text-orange-800',
                };
                return colors[status] || 'bg-gray-100 text-gray-800';
            };

            const totalRevenue = invoices.reduce((sum, inv) => sum + inv.amount, 0);
            const totalReceived = invoices.reduce((sum, inv) => sum + inv.received, 0);
            const totalOutstanding = totalRevenue - totalReceived;
            const activeTasks = tasks.filter(t => t.status !== 'Completed').length;

            return (
                <div className="min-h-screen bg-slate-950 text-gray-100">
                    <div className="fixed left-0 top-0 w-64 h-screen bg-gradient-to-b from-slate-900 to-slate-950 border-r border-slate-800 p-6 overflow-y-auto">
                        <div className="mb-8">
                            <h1 className="text-xl font-bold text-blue-400">CA Firm Portal</h1>
                            <p className="text-xs text-slate-400">Management System</p>
                        </div>
                        <nav className="space-y-2">
                            {[
                                { id: 'dashboard', label: 'Dashboard', icon: '📊' },
                                { id: 'tasks', label: 'Tasks', icon: '✅' },
                                { id: 'invoices', label: 'Invoices', icon: '💰' },
                                { id: 'staff', label: 'Staff', icon: '👥' },
                            ].map(item => (
                                <button
                                    key={item.id}
                                    onClick={() => setActiveModule(item.id)}
                                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-all ${
                                        activeModule === item.id
                                            ? 'bg-gradient-to-r from-blue-600 to-blue-500 text-white shadow-lg'
                                            : 'text-slate-300 hover:bg-slate-800'
                                    }`}
                                >
                                    <span>{item.icon}</span>
                                    <span className="font-medium">{item.label}</span>
                                </button>
                            ))}
                        </nav>
                    </div>

                    <div className="ml-64">
                        <div className="bg-slate-900 border-b border-slate-800 p-8">
                            <h2 className="text-3xl font-bold text-white">
                                {activeModule === 'dashboard' && 'Dashboard'}
                                {activeModule === 'tasks' && 'Tasks'}
                                {activeModule === 'invoices' && 'Invoices'}
                                {activeModule === 'staff' && 'Staff'}
                            </h2>
                        </div>

                        <div className="p-8">
                            {activeModule === 'dashboard' && (
                                <div className="space-y-6">
                                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                                        <div className="bg-blue-900 rounded-lg p-4 border border-blue-700">
                                            <p className="text-blue-200 text-sm">Active Tasks</p>
                                            <p className="text-3xl font-bold text-white mt-2">{activeTasks}</p>
                                        </div>
                                        <div className="bg-green-900 rounded-lg p-4 border border-green-700">
                                            <p className="text-green-200 text-sm">Revenue</p>
                                            <p className="text-3xl font-bold text-white mt-2">₹{(totalRevenue/100000).toFixed(1)}L</p>
                                        </div>
                                        <div className="bg-orange-900 rounded-lg p-4 border border-orange-700">
                                            <p className="text-orange-200 text-sm">Outstanding</p>
                                            <p className="text-3xl font-bold text-white mt-2">₹{(totalOutstanding/100000).toFixed(1)}L</p>
                                        </div>
                                        <div className="bg-purple-900 rounded-lg p-4 border border-purple-700">
                                            <p className="text-purple-200 text-sm">Team</p>
                                            <p className="text-3xl font-bold text-white mt-2">{staff.length}</p>
                                        </div>
                                    </div>
                                    <div className="bg-blue-600 text-white p-4 rounded-lg">
                                        <h3 className="font-bold">🎉 Portal is LIVE!</h3>
                                        <p>All features are working. Explore the menu to see more.</p>
                                    </div>
                                </div>
                            )}

                            {activeModule === 'tasks' && (
                                <div className="bg-slate-900 rounded-lg border border-slate-800 overflow-hidden">
                                    <table className="w-full">
                                        <thead className="bg-slate-800">
                                            <tr>
                                                <th className="px-4 py-2 text-left">Task ID</th>
                                                <th className="px-4 py-2 text-left">Title</th>
                                                <th className="px-4 py-2 text-left">Status</th>
                                                <th className="px-4 py-2 text-left">Progress</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {tasks.map(task => (
                                                <tr key={task.id} className="border-t border-slate-700 hover:bg-slate-800">
                                                    <td className="px-4 py-2 text-blue-400">{task.id}</td>
                                                    <td className="px-4 py-2">{task.title}</td>
                                                    <td className="px-4 py-2"><span className={`px-2 py-1 rounded text-xs ${getStatusColor(task.status)}`}>{task.status}</span></td>
                                                    <td className="px-4 py-2">{task.complete}%</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}

                            {activeModule === 'invoices' && (
                                <div className="bg-slate-900 rounded-lg border border-slate-800 overflow-hidden">
                                    <table className="w-full">
                                        <thead className="bg-slate-800">
                                            <tr>
                                                <th className="px-4 py-2 text-left">Invoice</th>
                                                <th className="px-4 py-2 text-left">Client</th>
                                                <th className="px-4 py-2 text-left">Amount</th>
                                                <th className="px-4 py-2 text-left">Status</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {invoices.map(inv => (
                                                <tr key={inv.id} className="border-t border-slate-700 hover:bg-slate-800">
                                                    <td className="px-4 py-2 text-blue-400">{inv.id}</td>
                                                    <td className="px-4 py-2">{inv.client}</td>
                                                    <td className="px-4 py-2">₹{inv.amount.toLocaleString()}</td>
                                                    <td className="px-4 py-2"><span className={`px-2 py-1 rounded text-xs ${getStatusColor(inv.status)}`}>{inv.status}</span></td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}

                            {activeModule === 'staff' && (
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    {staff.map(member => (
                                        <div key={member.id} className="bg-slate-900 rounded-lg border border-slate-800 p-4">
                                            <h3 className="font-bold text-white">{member.name}</h3>
                                            <p className="text-sm text-slate-400">{member.designation}</p>
                                            <div className="mt-3 space-y-2 text-sm">
                                                <p>📧 {member.email}</p>
                                                <p>📋 Tasks: {member.tasks}</p>
                                                <p>📊 Utilization: {member.utilization}%</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<CAFirmPortal />);
    </script>
</body>
</html>
